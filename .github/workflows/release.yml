name: "Publish Release"

on:
  push:
    # 当你推送到 main 分支时触发打包
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # 这里定义了你要打包的系统：Windows 和 macOS
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # 1. 设置 Node.js 环境
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 升级到 22，紧跟时代

      # 2. 设置 Rust 环境
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # 3. Windows 端特有的依赖补全（如果需要）
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # 暂时没用到 linux，但留着备用
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      # 4. 安装前端依赖
      - name: install frontend dependencies
        run: npm install

      # 5. 执行 Tauri 打包
      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # 会自动读取 package.json 里的版本号
          releaseName: "GIF Comp v__VERSION__"
          releaseBody: "imageToGIF 的版本，支持 Windows 和 macOS 双平台！"
          releaseDraft: false
          prerelease: false