name: "Publish Release"

on:
  push:
    branches:
      - main # 监听 main 分支的变动

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须设为 0，否则无法获取历史版本进行自增

      # --- 关键步骤：自动生成 Tag ---
      - name: Auto Tag Generation
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # 默认每次推送到 main 都增加修订号 (x.x.1)

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      # --- 核心修改：使用刚刚生成的动态 Tag 打包 ---
      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 使用上面步骤生成的 new_tag
          tagName: ${{ steps.tag_version.outputs.new_tag }} 
          releaseName: "GIF Comp ${{ steps.tag_version.outputs.new_tag }}"
          releaseBody: "由 GitHub Actions 自动构建，版本号：${{ steps.tag_version.outputs.new_tag }}"
          releaseDraft: false # 直接发布，不存草稿
          prerelease: false